<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #3a6073, #3a6073);
            color: white;
            overflow: hidden;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            animation: slideIn 1s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); }
            to { transform: translateY(0); }
        }

        .content {
            text-align: center;
            margin: 20px;
        }

        .button {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #f39c12;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .button:hover {
            background: #e67e22;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Blockchain Revolution</h1>
    </header>
    <div class="content">
        <p>Join us in exploring the future of decentralized technology and financial freedom.</p>
        <button class="button">Get Started</button>
    </div>
    <footer>
        <p>&copy; 2026 Western Blockchain</p>
    </footer>
</body>
</html>
